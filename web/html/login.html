<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SNET v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ant-design-vue/3.2.20/antd.min.css">
    <style>
        :root {
            --primary-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
        }
        body {
            background: radial-gradient(circle at top left, #0f172a 0%, #020617 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: var(---glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px;
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            color: #fff;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ant-form-item-label > label { color: rgba(255, 255, 255, 0.8) !important; }
        .ant-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border-radius: 12px !important;
            height: 45px !important;
        }
        .ant-btn-primary {
            background: linear-gradient(to right, #38bdf8, #818cf8) !important;
            border: none !important;
            border-radius: 12px !important;
            height: 45px !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3) !important;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-card">
            <div class="logo">
                <h1>SNET</h1>
            </div>
            <a-form layout="vertical" @submit.prevent="handleLogin">
                <a-form-item label="Username">
                    <a-input v-model:value="form.username" placeholder="Enter username" />
                </a-form-item>
                <a-form-item label="Password">
                    <a-input-password v-model:value="form.password" placeholder="Enter password" />
                </a-form-item>
                <a-form-item>
                    <a-button type="primary" block html-type="submit" :loading="loading">
                        Access Control Center
                    </a-button>
                </a-form-item>
            </a-form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.47/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ant-design-vue/3.2.20/antd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.3.4/axios.min.js"></script>

    <script>
        const { createApp, ref, reactive } = Vue;
        const app = createApp({
            setup() {
                const loading = ref(false);
                const form = reactive({
                    username: '',
                    password: ''
                });

                const handleLogin = async () => {
                    loading.value = true;
                    try {
                        const formData = new FormData();
                        formData.append('username', form.username);
                        formData.append('password', form.password);
                        
                        const res = await axios.post('/login', formData);
                        if (res.data.success) {
                            window.location.href = '/panel';
                        } else {
                            antd.message.error(res.data.msg || 'Login failed');
                        }
                    } catch (e) {
                        antd.message.error('An error occurred');
                    } finally {
                        loading.value = false;
                    }
                };

                return { form, loading, handleLogin };
            }
        });
        app.use(antd);
        app.mount('#app');
    </script>
</body>
</html>
