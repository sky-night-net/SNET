version: '3.8'

services:
  snet:
    build: .
    image: snet-v2:latest
    container_name: snet-panel
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /etc/snet:/etc/snet
      - /var/log/snet:/var/log/snet
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SNET_DB_FOLDER=/etc/snet
      - SNET_BIN_FOLDER=/app
      - SNET_LOG_LEVEL=info
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    devices:
      - /dev/net/tun:/dev/net/tun
