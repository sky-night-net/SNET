name: Build and Release SNET 3.0

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Multi-Arch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
          mkdir -p api/dist
          mv frontend/dist/* api/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Debug File Structure
        run: |
          ls -R api/

      - name: Build Backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v -o snet-${{ matrix.goos }}-${{ matrix.goarch }} main.go

      - name: Package
        run: |
          tar -czvf snet-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz snet-${{ matrix.goos }}-${{ matrix.goarch }} install.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: snet-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snet-linux-amd64/snet-linux-amd64.tar.gz
            snet-linux-arm64/snet-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
