name: SNET Build & Test CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        check-latest: true

    - name: Download Go Dependencies
      run: |
        go mod tidy
        go mod download

    - name: Build Go Application
      run: CGO_ENABLED=1 GOOS=linux go build -v -o snet main.go
      
    - name: Build Docker Image
      run: docker build -t sky-night-net/snet:test .
